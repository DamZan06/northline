<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>North Line Live</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css">

</head>


<body>


<!-- Pannello statistiche -->

<div id="statsPanel">


    <div id="statsHeader">

        <div id="distance"></div>
        <div id="remaining"></div>
        <div id="time"></div>
        <div id="elevation"></div>
        <div id="speed"></div>

    </div>

    <div id="mapStyleSwitcher" class="map-style-switcher" aria-label="Seleziona stile mappa">
        <button class="map-style-btn active" data-style="osm" type="button">
            <img src="assets/map-style-map.svg" alt="Mappa">
            <span>Mappa</span>
        </button>
        <button class="map-style-btn" data-style="sat" type="button">
            <img src="assets/map-style-sat.svg" alt="Satellite">
            <span>Sat</span>
        </button>
        <button class="map-style-btn" data-style="topo" type="button">
            <img src="assets/map-style-topo.svg" alt="Topografico">
            <span>Topo</span>
        </button>
    </div>


    <div id="statsContent">

        <h3>Velocità</h3>

        <canvas id="speedChart"></canvas>


        <h3>Profilo altimetrico</h3>

        <canvas id="elevationChart"></canvas>


    </div>


</div>



<!-- Mappa -->

<div id="map"></div>




<!-- Librerie -->


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



<!-- Script -->


<script src="script.js"></script>


</body>

</html>
