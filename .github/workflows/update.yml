name: Update Garmin Position

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Garmin updater
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}

          GARMIN_SESSION_ID: ${{ secrets.GARMIN_SESSION_ID }}
          GARMIN_TOKEN: ${{ secrets.GARMIN_TOKEN }}
          GARMIN_CSRF_TOKEN: ${{ secrets.GARMIN_CSRF_TOKEN }}

          GARMIN_COOKIE: ${{ secrets.GARMIN_COOKIE }}

          GARMIN_REFERER: ${{ secrets.GARMIN_REFERER }}

          LOOKBACK_SECONDS: ${{ secrets.LOOKBACK_SECONDS }}

          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node server.js
