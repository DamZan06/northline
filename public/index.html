<!DOCTYPE html>

<html>

<body>

<h1>Garmin LiveTrack Test</h1>

<div id="data">
Caricamento...
</div>


<script>

async function update(){

    const response = await fetch("/garmin");

    const data = await response.json();


    let point = data.trackPoints[
        data.trackPoints.length - 1
    ];


    document.getElementById("data").innerHTML = `

    Lat:
    ${point.position.lat}
    <br>

    Lon:
    ${point.position.lon}

    <br><br>

    Velocità:
    ${(point.speedMetersPerSec*3.6).toFixed(1)}
    km/h

    <br>

    Altitudine:
    ${point.altitude}
    m

    <br>

    Distanza:
    ${(point.totalDistanceMeters/1000).toFixed(2)}
    km

    `;

}


update();

setInterval(update,20000);


</script>


</body>

</html>
