<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>NorthLine – Replay</title>
    <meta name="description" content="Replay del percorso NorthLine con controllo di velocità, pausa e selezione giornata.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="icon" href="assets/favicon-v2.png?v=20260715f">
</head>
<body data-page="replay">
    <header class="topbar">
        <div class="brand">
            <img src="assets/favicon-v2.png?v=20260715f" alt="Logo NorthLine" class="brand-icon">
            <div>
                <span class="brand-title">NorthLine</span>
                <span class="brand-subtitle">Replay</span>
            </div>
        </div>
        <nav class="main-nav" aria-label="Navigazione principale">
            <a href="index.html">Home</a>
            <a href="live.html">Live</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="diary.html">Diario</a>
            <a href="gallery.html">Galleria</a>
            <a href="timeline.html">Timeline</a>
            <a href="replay.html">Replay</a>
            <a href="progress.html">Progressi</a>
            <a href="project.html">Il progetto</a>
        </nav>
        <div class="topbar-actions">
            <button id="themeToggle" class="button ghost">Tema</button>
            <a class="button primary" href="live.html">Mappa Live</a>
        </div>
    </header>
    <main class="page page-replay">
        <section class="section">
            <div class="section-title">
                <p class="eyebrow">Replay</p>
                <h2>Rivivi il percorso.</h2>
                <p>Riproduci l'intero tracciato, metti in pausa, accelera e controlla i punti più significativi.</p>
            </div>
            <div class="replay-controls" style="display:grid;gap:16px;">
                <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
                    <button id="replayPlay" class="button primary">Riproduci</button>
                    <button id="replayPause" class="button ghost">Pausa</button>
                    <button id="replayReset" class="button secondary">Reset</button>
                </div>
                <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
                    <label for="replaySpeed">Velocità:</label>
                    <input id="replaySpeed" type="range" min="100" max="1200" step="100" value="500">
                    <span id="replaySpeedLabel">500 ms</span>
                    <span id="replayStatus">Replay pronto</span>
                </div>
            </div>
            <div class="map-wrap" style="min-height:560px;">
                <div id="map"></div>
            </div>
        </section>
    </main>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="script.js?v=20260715"></script>
</body>
</html>
