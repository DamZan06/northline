<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>North Line Live Tracker</title>

    <meta name="description"
          content="Segui la North Line in tempo reale con mappa GPS, velocità, altitudine e statistiche aggiornate dal Garmin LiveTrack.">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css">

    <meta property="og:title" content="North Line Live Tracker">
    <meta property="og:description" content="Segui la North Line in tempo reale sulla mappa con Garmin LiveTrack.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://damzan06.github.io/northline/preview.png">    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:locale" content="it_IT">
    <meta property="og:site_name" content="North Line Live Tracker">
    <meta property="og:url" content="https://damzan06.github.io/northline/">
    <link rel="canonical" href="https://damzan06.github.io/northline/">

    <link rel="icon" href="favicon-v2.png">

</head>

<body>

    <h1 class="visually-hidden">
        North Line Live Tracker
    </h1>

    <p class="visually-hidden">
        Segui la North Line in tempo reale grazie al Garmin LiveTrack.
        Visualizza posizione GPS, velocità, altitudine, distanza percorsa e progressi sulla mappa.
    </p>
    <!-- Pannello statistiche -->

    <div id="statsPanel">

        <div id="statsHeader">

            <div id="distance"></div>
            <div id="time"></div>
            <div id="elevation"></div>
            <div id="speed"></div>
            <div id="eta"></div>
            <div id="lastUpdate"></div>

        </div>

        <div id="statsContent">


            <div id="progressContainer">

                <div id="progressText">
                    Completamento
                </div>

                <div id="progressBarBackground">

                    <div id="progressBar"></div>

                </div>

            </div>



            <h3>Velocità</h3>

            <div class="chartContainer">
                <canvas id="speedChart"></canvas>
            </div>


            <h3>Profilo altimetrico</h3>

            <div class="chartContainer">
                <canvas id="elevationChart"></canvas>
            </div>


        </div>

    </div>

    <!-- Mappa -->

    <div id="map"></div>

    <!-- Librerie -->

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Script -->

    <script src="script.js"></script>

</body>

</html>
