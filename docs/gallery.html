<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>NorthLine – Galleria</title>
    <meta name="description" content="Galleria fotografica NorthLine con filtro per giorno, checkpoint, località e bivacchi.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=20260715q">
    <link rel="icon" type="image/png" href="assets/favicon-v2.png?v=20260715q">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=20260715q">
</head>
<body data-page="gallery">
    <header class="topbar">
        <div class="brand">
            <img src="assets/favicon-v2.png?v=20260715q" alt="Logo NorthLine" class="brand-icon">
            <div>
                <span class="brand-title">NorthLine</span>
                <span class="brand-subtitle">Galleria</span>
            </div>
        </div>
        <nav class="main-nav" aria-label="Navigazione principale">
            <a href="index.html">Home</a>
            <a href="live.html">Live</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="diary.html">Diario</a>
            <a href="gallery.html">Galleria</a>
            <a href="timeline.html">Timeline</a>
            <a href="replay.html">Replay</a>
            <a href="progress.html">Progressi</a>
            <a href="project.html">Il progetto</a>
        </nav>
        <div class="topbar-actions">
            <button id="themeToggle" class="button ghost">Tema</button>
            <a class="button primary" href="live.html">Mappa Live</a>
        </div>
    </header>
    <main class="page page-gallery">
        <section class="section">
            <div class="section-title">
                <p class="eyebrow">Fotografie</p>
                <h2>Galleria multimediale.</h2>
                <p>Filtra per giorno, località, checkpoint e bivacco per trovare i momenti più belli.</p>
            </div>
            <div class="gallery-controls gallery-filter">
                <button class="button secondary" data-filter="all">Tutti</button>
                <button class="button secondary" data-filter="montagna">Montagna</button>
                <button class="button secondary" data-filter="checkpoint">Checkpoint</button>
                <button class="button secondary" data-filter="bivacco">Bivacco</button>
                <button class="button secondary" data-filter="città">Città</button>
            </div>
            <div class="gallery-grid"></div>
        </section>
    </main>
    <div class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal-content">
            <button class="modal-close" aria-label="Chiudi">×</button>
            <img id="modalImage" src="assets/preview.png" alt="">
            <div class="modal-details">
                <h3 id="modalTitle">Titolo immagine</h3>
                <p id="modalLocation">Località</p>
                <p id="modalDescription">Descrizione della foto e posizione sulla mappa.</p>
            </div>
        </div>
    </div>
    <script src="script.js?v=20260715p"></script>
</body>
</html>
